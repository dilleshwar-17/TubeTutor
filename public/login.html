<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - 45 Day DSA Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.1);
    --accent1: #a78bfa;
    --accent2: #38bdf8;
    --text: #f1f5f9;
    --text-muted: rgba(241,245,249,0.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0a0a1a;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Three.js Background styles */
  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
    pointer-events: none;
  }

  .login-card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(25px) saturate(200%);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 48px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, var(--accent1) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(167, 139, 250, 0.4);
  }

  .back-link:hover { color: var(--text); }

  .hidden { display: none; }
</style>
</head>
<body>

<script src="/js/three-bg.js"></script>

<div class="login-card">
  <div class="logo">
    <h1>DSA Tracker</h1>
    <p style="color: var(--text-muted); font-size: 14px; margin-top: 8px;">Sign in to continue your journey</p>
  </div>

  <div id="google-signin" style="margin: 40px 0;"></div>

  <a href="/" class="back-link">← Back to Tracker</a>
</div>

<script>
  let googleClientId = '';

  const CLIENT_KEY = 'dsa-tracker-client-id';
  function getClientId() {
    let id = localStorage.getItem(CLIENT_KEY);
    if (!id) {
      id = window.crypto.randomUUID();
      localStorage.setItem(CLIENT_KEY, id);
    }
    return id;
  }

  async function api(path, options = {}) {
    const response = await fetch(path, {
      ...options,
      headers: {
        'Content-Type': 'application/json',
        'x-client-id': getClientId(),
        ...(options.headers || {})
      }
    });
    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error || `Error ${response.status}`);
    }
    return response.json();
  }

  async function initGoogle() {
    try {
      const config = await api('/api/config');
      googleClientId = config.googleClientId;
      if (!googleClientId) {
        document.getElementById('google-signin').innerHTML = '<p style="color:#ef4444; font-size:12px;">Google Client ID not configured.</p>';
        return;
      }

      google.accounts.id.initialize({
        client_id: googleClientId,
        callback: handleGoogleCredential
      });
      google.accounts.id.renderButton(document.getElementById('google-signin'), {
        theme: 'filled_black',
        size: 'large',
        shape: 'pill',
        width: 324
      });
    } catch (e) {
      console.error('Failed to init Google Auth', e);
    }
  }

  async function handleGoogleCredential(response) {
    try {
      await api('/api/auth/google', {
        method: 'POST',
        body: JSON.stringify({ credential: response.credential })
      });
      window.location.href = '/';
    } catch (error) {
      alert('Google Auth failed: ' + error.message);
    }
  }

  window.onload = initGoogle;
</script>
</body>
</html>
